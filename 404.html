<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>404 - ページが見つかりません｜ゆるおり</title>
  <meta name="description" content="ゆるおりの404ページです。お探しのページは見つかりませんでした。" />

  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <div class="site-bg">
    <div id="siteHeader"></div>

    <main>
      <section class="portal-top notfound-top">
        <div class="top-message notfound-message">
          <p class="eyebrow">404 NOT FOUND</p>
          <h1>ページが迷子です。</h1>
          <p>
            お探しのページは見つかりませんでした。
            URLが変わったか、まだ準備中の場所かもしれません。
          </p>
        </div>

        <div class="top-status notfound-status">
          <h2>迷子情報</h2>
          <dl>
            <div>
              <dt>状態</dt>
              <dd>見つからない</dd>
            </div>
            <div>
              <dt>場所</dt>
              <dd>ゆるおりのどこか</dd>
            </div>
            <div>
              <dt>案内</dt>
              <dd>トップへ戻ってね</dd>
            </div>
          </dl>
        </div>
      </section>

      <section class="notfound-pickup">
        <section class="portal-box notfound-illust-box">
          <h2>404エリア</h2>

          <div class="notfound-illust-wrap">
            <div class="notfound-illust">
              <div class="notfound-heart"></div>

              <div class="notfound-cat">
                <span class="cat-ear-left"></span>
                <span class="cat-ear-right"></span>
                <span class="cat-eye-left"></span>
                <span class="cat-eye-right"></span>
                <span class="cat-mouth-small">ω</span>
              </div>

              <p class="notfound-big">404</p>
            </div>
          </div>

          <div class="illust-caption notfound-caption">
            <strong>このページは見つかりませんでした</strong>
            <p>
              迷った時は、トップページからもう一度探してみてください。
            </p>

            <div class="notfound-link-row">
              <a class="mini-button" href="index.html">トップページへ</a>
              <a class="mini-button" href="play/index.html">探検入口へ</a>
            </div>
          </div>
        </section>
      </section>
    </main>

    <div id="siteFooter"></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
