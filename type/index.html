<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>レアキャラ性格診断｜ゆるおり</title>
  <meta name="description" content="あなたはどんなレアキャラタイプ？30タイプから診断します。" />

  <!-- OGP -->
<meta property="og:title" content="レアキャラ性格診断｜ゆるおり" />
<meta property="og:description" content="あなたはどんなレアキャラ？30タイプから性格を診断します。" />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://yuruori.com/type/" />
<meta property="og:image" content="https://yuruori.com/type/images/hero.png" />
<meta property="og:site_name" content="ゆるおり" />

<!-- Twitter / X Card -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="レアキャラ性格診断｜ゆるおり" />
<meta name="twitter:description" content="あなたはどんなレアキャラ？30タイプから性格を診断します。" />
<meta name="twitter:image" content="https://yuruori.com/type/images/hero.png" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="page">
    <section class="hero">
  <div class="hero-inner">
    <div class="hero-visual">
      <img src="images/hero.png" alt="レアキャラ性格診断のヒーロー画像" />
    </div>

    <div class="hero-text">
      <p class="label">YURUORI TYPE CHECK</p>

      <h1>レアキャラ性格診断</h1>

      <p class="lead">
        あなたの性格を30タイプの“レアキャラ”に分類する診断です。<br>
        ノリで答えてOK。深く考えすぎたら負け。
      </p>

      <div class="hero-badges">
        <span>N〜LR</span>
        <span>30タイプ</span>
        <span>カード風診断</span>
      </div>

      <button id="startBtn" class="main-btn">診断をはじめる</button>
    </div>
  </div>
</section>

    <section id="quizArea" class="quiz-area hidden">
      <div class="quiz-head">
        <p id="questionCount" class="question-count"></p>
        <div class="progress">
          <div id="progressBar" class="progress-bar"></div>
        </div>
      </div>

      <h2 id="questionText" class="question-text"></h2>

      <div id="choices" class="choices"></div>
    </section>

    <section id="resultArea" class="result-area hidden">
      <div class="result-top">
        <img id="resultImage" class="result-image" src="" alt="" />

        <div class="result-main">
          <p id="resultRarity" class="result-rarity"></p>
          <h2 id="resultTitle" class="result-title"></h2>
          <p id="resultCatch" class="result-catch"></p>
        </div>
      </div>

      <div class="result-grid">
        <div class="result-card">
          <h3>どんなタイプ？</h3>
          <p id="resultDescription"></p>
        </div>

        <div class="result-card">
          <h3>強み</h3>
          <p id="resultStrength"></p>
        </div>

        <div class="result-card">
          <h3>弱点</h3>
          <p id="resultWeakness"></p>
        </div>

        <div class="result-card">
          <h3>相性がいいタイプ</h3>
          <p id="resultMatch"></p>
        </div>
      </div>

      <div class="result-buttons">
        <button id="shareBtn" class="sub-btn">結果をコピー</button>
        <button id="retryBtn" class="main-btn">もう一度診断する</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
