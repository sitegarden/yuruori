<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>レアキャラ性格診断｜ゆるおり</title>
  <meta name="description" content="あなたはどんなレアキャラタイプ？30タイプから診断します。" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="page">
    <section class="hero">
      <p class="label">YURUORI TYPE CHECK</p>
      <h1>レアキャラ性格診断</h1>
      <p class="lead">
        あなたの性格を30タイプの“レアキャラ”に分類する診断です。<br>
        ノリで答えてOK。深く考えすぎたら負け。
      </p>

      <button id="startBtn" class="main-btn">診断をはじめる</button>
    </section>

    <section id="quizArea" class="quiz-area hidden">
      <div class="progress">
        <div id="progressBar" class="progress-bar"></div>
      </div>

      <p id="questionCount" class="question-count"></p>
      <h2 id="questionText" class="question-text"></h2>

      <div id="choices" class="choices"></div>
    </section>

    <section id="resultArea" class="result-area hidden">
      <p id="resultRarity" class="result-rarity"></p>
      <h2 id="resultTitle" class="result-title"></h2>
      <p id="resultCatch" class="result-catch"></p>

      <div class="result-card">
        <h3>どんなタイプ？</h3>
        <p id="resultDescription"></p>
      </div>

      <div class="result-card">
        <h3>強み</h3>
        <p id="resultStrength"></p>
      </div>

      <div class="result-card">
        <h3>弱点</h3>
        <p id="resultWeakness"></p>
      </div>

      <div class="result-card">
        <h3>相性がいいタイプ</h3>
        <p id="resultMatch"></p>
      </div>

      <button id="shareBtn" class="sub-btn">結果をコピー</button>
      <button id="retryBtn" class="main-btn">もう一度診断する</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
