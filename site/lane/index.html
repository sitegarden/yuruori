<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laneの自己紹介</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">

    <section class="hero-card">
      <div class="hero-text">
        <div class="label">PROFILE</div>

        <h1>Lane</h1>

        <p class="lead">
          このサイトのオーナーです。<br>
          自己紹介や好きなものを、ゆるくまとめています。
        </p>

        <div class="button-row">
          <a class="main-button" href="https://yuruori.com/">Yuruoriを見る</a>
          <a class="sub-button" href="#profile">プロフィール</a>
        </div>
      </div>

      <div class="hero-images">
        <img src="image1.png" alt="Laneの画像1">
        <img src="image2.png" alt="Laneの画像2">
      </div>
    </section>

    <section id="profile" class="content-grid">
      <div class="panel">
        <h2>PROFILE</h2>

        <div class="info-list">
          <div class="info-row">
            <span>名前</span>
            <p>Lane</p>
          </div>

          <div class="info-row">
            <span>MBTI</span>
            <p>ESTP</p>
          </div>

          <div class="info-row">
            <span>エニアグラム</span>
            <p>7w8 / △378</p>
          </div>

          <div class="info-row">
            <span>星座</span>
            <p>おひつじ座</p>
          </div>
        </div>
      </div>

      <div class="panel">
        <h2>ひとこと</h2>

        <p>
          このサイトのオーナーです。
        </p>

        <p>
          自己紹介や好きなものを、ゆるくまとめています。
        </p>

        <p>
          気軽に見てもらえたら嬉しいです。
        </p>
      </div>
    </section>

    <section class="panel link-panel">
      <h2>LINK</h2>
      <a href="https://yuruori.com/">Yuruori</a>
    </section>

    <footer class="footer">
      <p>yuruori.com/site/lane/</p>
    </footer>

  </main>
</body>
</html>
